aid: apache-doris
name: Apache Doris
description: >-
  Apache Doris is a high-performance, real-time analytical database based on MPP (Massively Parallel Processing) architecture, governed by the Apache Software Foundation. It provides MySQL-protocol-compatible
  SQL queries, sub-second query latency on large-scale data, columnar storage with vectorized execution, real-time upsert via Stream Load and Routine Load APIs, and federated querying over data lakes (Hive,
  Iceberg, Hudi). It supports both shared-nothing and storage/compute-separated deployment modes.
